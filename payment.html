<!DOCTYPE html>
<html>
<head>
  <title>KBS Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #111827;
      text-align: center;
    }

    .payment-box {
      max-width: 420px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .logo {
      width: 90px;
      height: 90px;
      background: #0057d9;
      color: white;
      border-radius: 25px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    p {
      font-size: 17px;
      color: #4b5563;
    }

    .pay-btn {
      width: 100%;
      padding: 16px;
      background: #0057d9;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
    }

    .pay-btn:hover {
      background: #003f9e;
    }

    .back-link {
      display: block;
      margin-top: 25px;
      color: #0057d9;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="payment-box">
    <div class="logo">KBS</div>

    <h1>KBS Business Payment</h1>

    <p>Pay securely for KBS Business services using MTN Mobile Money.</p>
<div>
  <button class="pay-btn" onclick="selectService('Website Design', 5000)">Website Design - GHS 50</button>
  <br><br>
  <button class="pay-btn" onclick="selectService('Business Support', 3000)">Business Support - GHS 30</button>
  <br><br>
  <button class="pay-btn" onclick="selectService('Online Marketing', 2000)">Online Marketing - GHS 20</button>
</div>

<p id="selectedService">Selected: Website Design - GHS 50</p>
<button class="pay-btn" onclick="payWithPaystack()">
  Pay with MTN MoMo
  
</button>

<a href="https://wa.me/233257906873"
   class="pay-btn"
   style="display:block;text-align:center;text-decoration:none;margin-top:20px;">
   Contact Us on WhatsApp
</a>

    <a class="back-link" href="index.html">Go back home</a>
  </div>
<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
let selectedAmount = 5000;
let selectedService = 'Website Design';

function selectService(service, amount) {
  selectedService = service;
  selectedAmount = amount;
  document.getElementById('selectedService').innerText =
    'Selected: ' + service + ' - GHS ' + (amount / 100);
}
function payWithPaystack() {
  let handler = PaystackPop.setup({
    key: 'pk_live_f5146d54486857fc2dd6795a3bbc4570b8f3042e',
    email: 'kennethyeboah223@gmail.com',
    amount: selectedAmount,
    currency: 'GHS',

    callback: function(response) {
      alert('Payment successful! Thank you for choosing KBS Business.');
    },

    onClose: function() {
      alert('Payment cancelled');
    }
  });

  handler.openIframe();
}
</script>
</body>
</html>
