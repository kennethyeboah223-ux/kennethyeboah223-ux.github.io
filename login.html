<!DOCTYPE html>
<html>
<head>
<title>KBS Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
padding:20px;
}

.box{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#0066ff;
color:white;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<div class="box">
<h2>KBS Login / Sign Up NEW VERSION</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signUp()">SIGN UP TEST</button>

<br><br>

<button onclick="signIn()">Login</button>

<p id="msg" style="color:red;font-weight:bold;">TEST</p>
</div>

<script>
const supabaseUrl =
'https://nqbnfhgvexokxjobrasp.supabase.co';

const supabaseKey =
'sb_publishable_nDhlT9nfY02Jf6brBAzz9w_wYPVQulZ';

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

async function signUp() {
    alert("SignUp function started");
const email =
document.getElementById('email').value;

const password =
document.getElementById('password').value;

const { error } =
await supabase.auth.signUp({
email,
password
});

document.getElementById('msg').innerText =
error ? error.message :
'Check your email for verification.';
}

async function signIn() {
const email =
document.getElementById('email').value;

const password =
document.getElementById('password').value;

const { error } =
await supabase.auth.signInWithPassword({
email,
password
});

document.getElementById('msg').innerText =
error ? error.message :
'Login successful!';
}
</script>

</body>
</html>
